name: Update Dorados Stats

# Hourly polling 08:00–18:00 Madrid time so we pick up Baseball Reference's
# daily update within ~1 hour of it being posted (BR usually updates by 16:00
# Madrid, but the exact time varies).
#
# DST handling: GitHub Actions cron runs in UTC and ignores DST. Madrid is
# UTC+1 in winter (CET) and UTC+2 in summer (CEST). Madrid 08:00–18:00 maps
# to UTC 06:00–16:00 in summer and UTC 07:00–17:00 in winter. We schedule
# the union (UTC 06:00–17:00, 12 hourly triggers) and let the guard step
# below filter to only proceed when Madrid local hour is 8–18. In any season
# this yields ~11 actual scrapes per day.
#
# The commit step only commits when the file actually changed, so most of
# those runs exit silently and don't create noise in commit history.
on:
  schedule:
    - cron: "0 6-17 * * *"   # hourly, 06:00–17:00 UTC
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write            # needed to commit the updated file back to the repo

# Opt into Node.js 24 now so the deprecation warning for actions/checkout@v4
# and actions/setup-python@v5 goes away. Becomes the default after June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: dorados-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check that Madrid local hour is in 08:00–18:00 window
        id: madrid_check
        run: |
          MADRID_HOUR=$(TZ='Europe/Madrid' date '+%H')
          MADRID_TIME=$(TZ='Europe/Madrid' date '+%Y-%m-%d %H:%M %Z')
          echo "Madrid local time: $MADRID_TIME"
          # Strip leading zero so bash arithmetic doesn't interpret 08/09 as octal.
          HOUR_NUM=$((10#$MADRID_HOUR))
          if { [ "$HOUR_NUM" -lt 8 ] || [ "$HOUR_NUM" -gt 18 ]; } && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Outside 08:00–18:00 Madrid window (current hour: $MADRID_HOUR). Exiting cleanly."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.madrid_check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.madrid_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.madrid_check.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run scraper
        if: steps.madrid_check.outputs.should_run == 'true'
        env:
          DORADOS_TEAM_URL: https://www.baseball-reference.com/register/team.cgi?id=1181cb66
        run: python scrape.py

      - name: Commit updated file
        if: steps.madrid_check.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dorados_Stats.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            MADRID_STAMP=$(TZ='Europe/Madrid' date '+%Y-%m-%d %H:%M %Z')
            git commit -m "Auto-update Dorados stats — $MADRID_STAMP"
            git push
          fi
