name: Update Dorados Stats

# DST handling: GitHub Actions cron runs in UTC and ignores DST.
# Madrid is UTC+1 in winter (CET) and UTC+2 in summer (CEST).
# 16:00 Madrid = 15:00 UTC (winter) or 14:00 UTC (summer).
# We schedule BOTH and use a guard step to only proceed when it's actually 16:00 in Madrid.
on:
  schedule:
    - cron: "0 14 * * *"   # 16:00 Madrid in summer (CEST)
    - cron: "0 15 * * *"   # 16:00 Madrid in winter (CET)
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write            # needed to commit the updated file back to the repo

concurrency:
  group: dorados-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check that it's 16:00 in Madrid right now
        id: madrid_check
        run: |
          MADRID_HOUR=$(TZ='Europe/Madrid' date '+%H')
          MADRID_TIME=$(TZ='Europe/Madrid' date '+%Y-%m-%d %H:%M %Z')
          echo "Madrid local time: $MADRID_TIME"
          if [ "$MADRID_HOUR" != "16" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Not 16:00 in Madrid yet (current hour: $MADRID_HOUR). Exiting cleanly."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repo
        if: steps.madrid_check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.madrid_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.madrid_check.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run scraper
        if: steps.madrid_check.outputs.should_run == 'true'
        env:
          DORADOS_TEAM_URL: https://www.baseball-reference.com/register/team.cgi?id=1181cb66
        run: python scrape.py

      - name: Commit updated file
        if: steps.madrid_check.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dorados_Stats.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            MADRID_STAMP=$(TZ='Europe/Madrid' date '+%Y-%m-%d %H:%M %Z')
            git commit -m "Auto-update Dorados stats — $MADRID_STAMP"
            git push
          fi
